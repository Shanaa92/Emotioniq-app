<body>

<div class="container">

<h2>EmotionIQ</h2>
<p>Describe a situation and discover the emotional trigger.</p>

<textarea id="userInput" placeholder="Example: My coworker ignored me today and it made me feel angry."></textarea>

<button onclick="analyzeEmotion()">Analyze Emotion</button>

<div class="result" id="result"></div>

</div>

<script>

function analyzeEmotion(){

let text=document.getElementById("userInput").value;

let result="";

if(text.includes("angry") || text.includes("mad")){
result="Possible Trigger: Feeling disrespected or unheard.";
}

else if(text.includes("sad")){
result="Possible Trigger: Emotional hurt or disappointment.";
}

else if(text.includes("anxious")){
result="Possible Trigger: Fear of uncertainty.";
}

else{
result="Emotion detected. Reflect on what need may not be met in this situation.";
}

document.getElementById("result").innerHTML=result;

}

</script>

</body>
</html>
